<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersoZap — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="text-4xl mb-2 block">📖</a>
      <h1 class="text-2xl font-bold text-gray-800">VersoZap</h1>
      <p class="text-gray-500 text-sm mt-1">Painel Administrativo</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
      <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="email" type="email" autocomplete="email" required
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="admin@exemplo.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input id="senha" type="password" autocomplete="current-password" required
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="••••••••">
        </div>
        <button type="submit" id="btn-login"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors">
          Entrar
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Primeiro acesso?
        <a href="/register.html" class="text-green-600 hover:underline font-medium">Criar conta admin</a>
      </p>
    </div>

    <p class="text-center mt-4">
      <a href="/" class="text-xs text-gray-400 hover:underline">← Voltar ao início</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem('vzToken')) window.location.replace('/dashboard.html');

    const alertEl = document.getElementById('alert');

    function showAlert(msg) {
      alertEl.textContent = msg;
      alertEl.className = 'mb-4 p-3 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200';
      alertEl.classList.remove('hidden');
    }

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value,
          }),
        });
        const d = await r.json();
        if (!r.ok) { showAlert(d.erro || 'Erro ao fazer login'); return; }

        localStorage.setItem('vzToken', d.token);
        localStorage.setItem('vzEmail', d.email);
        window.location.replace('/dashboard.html');
      } catch {
        showAlert('Erro de conexão com o servidor');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
