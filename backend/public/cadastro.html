<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersoZap — Inscrição</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-emerald-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md py-8">

    <div class="text-center mb-8">
      <a href="/" class="inline-flex flex-col items-center gap-1 group">
        <span class="text-5xl">📖</span>
        <span class="font-extrabold text-xl text-gray-900 group-hover:text-emerald-600 transition-colors">VersoZap</span>
      </a>
      <p class="text-gray-500 text-sm mt-2">Receba trechos da Bíblia todo dia no seu WhatsApp</p>
    </div>

    <div id="card-form" class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
      <div id="alert" class="hidden mb-4 p-3 rounded-xl text-sm"></div>

      <form id="form-cadastro" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Seu nome</label>
          <input id="nome" type="text"
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-shadow"
            placeholder="Como prefere ser chamado?">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">WhatsApp <span class="text-red-400">*</span></label>
          <input id="telefone" type="tel" required
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-shadow"
            placeholder="(67) 99999-9999">
          <p class="text-xs text-gray-400 mt-1">Somente Brasil. Inclua o DDD.</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Plano de leitura</label>
            <select id="plano_id"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white transition-shadow">
              <option value="">Carregando...</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Horário</label>
            <input id="horario_envio" type="time" value="07:00"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-shadow">
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Versão da Bíblia</label>
          <select id="versao_biblia"
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white transition-shadow">
            <option value="NVI">NVI — Nova Versão Internacional</option>
            <option value="ARC">ARC — Almeida Revista e Corrigida</option>
            <option value="ACF">ACF — Almeida Corrigida Fiel</option>
            <option value="NVT">NVT — Nova Versão Transformadora</option>
          </select>
        </div>

        <button type="submit" id="btn"
          class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-bold py-3 px-4 rounded-xl text-sm transition-colors shadow-sm">
          Quero receber versículos diários 🙏
        </button>
      </form>
    </div>

    <div id="card-sucesso" class="hidden bg-white rounded-2xl shadow-lg border border-gray-100 p-8 text-center">
      <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">✅</div>
      <h2 class="text-xl font-bold text-gray-800 mb-2">Inscrição realizada!</h2>
      <p class="text-gray-500 text-sm" id="msg-sucesso"></p>
      <button onclick="location.reload()"
        class="mt-6 text-sm text-emerald-600 hover:text-emerald-700 font-semibold">
        Inscrever outro número
      </button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Para cancelar, responda <strong>SAIR</strong> a qualquer mensagem recebida.
    </p>
  </div>

  <script>
    async function carregarPlanos() {
      try {
        const r = await fetch('/api/inscricao/planos');
        const planos = await r.json();
        const sel = document.getElementById('plano_id');
        sel.innerHTML = planos.map(p =>
          `<option value="${p.id}">${p.nome}</option>`
        ).join('');
      } catch {
        document.getElementById('plano_id').innerHTML = '<option value="">Erro ao carregar</option>';
      }
    }

    function formatarTelefone(tel) {
      const nums = tel.replace(/\D/g, '');
      if (nums.startsWith('55')) return nums;
      if (nums.length === 11 || nums.length === 10) return '55' + nums;
      return nums;
    }

    const alertEl = document.getElementById('alert');

    function showAlert(msg) {
      alertEl.textContent = msg;
      alertEl.className = 'mb-4 p-3 rounded-xl text-sm bg-red-50 text-red-700 border border-red-100';
      alertEl.classList.remove('hidden');
    }

    document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Aguarde...';
      alertEl.classList.add('hidden');

      const tel = formatarTelefone(document.getElementById('telefone').value);

      try {
        const r = await fetch('/api/inscricao', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            telefone:      tel,
            nome:          document.getElementById('nome').value || null,
            versao_biblia: document.getElementById('versao_biblia').value,
            plano_id:      document.getElementById('plano_id').value || null,
            horario_envio: document.getElementById('horario_envio').value,
          }),
        });
        const d = await r.json();
        if (!r.ok) { showAlert(d.erro || 'Erro ao fazer inscrição'); return; }

        document.getElementById('card-form').classList.add('hidden');
        document.getElementById('card-sucesso').classList.remove('hidden');
        document.getElementById('msg-sucesso').textContent = d.mensagem;
      } catch {
        showAlert('Erro de conexão. Tente novamente.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Quero receber versículos diários 🙏';
      }
    });

    carregarPlanos();
  </script>
</body>
</html>
