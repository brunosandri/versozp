<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersoZap — Meu Painel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen antialiased">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-20">
    <div class="max-w-2xl mx-auto px-4 py-3.5 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-extrabold text-gray-900">
        <span class="text-xl">📖</span> VersoZap
      </a>
      <div class="flex items-center gap-3">
        <span id="nav-nome" class="text-xs text-gray-500 hidden sm:block max-w-[140px] truncate"></span>
        <button onclick="sair()"
          class="text-xs font-semibold text-red-500 hover:text-red-700 border border-red-100 hover:border-red-200 px-3 py-1.5 rounded-lg transition-colors">
          Sair
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-8 space-y-5">

    <!-- Stats row -->
    <div class="grid grid-cols-3 gap-3">
      <div class="bg-white rounded-2xl border border-gray-100 p-4 text-center shadow-sm">
        <p id="stat-dia" class="text-2xl font-extrabold text-emerald-600">—</p>
        <p class="text-xs text-gray-400 mt-1">Dia atual</p>
      </div>
      <div class="bg-white rounded-2xl border border-gray-100 p-4 text-center shadow-sm">
        <p id="stat-pct" class="text-2xl font-extrabold text-emerald-600">—</p>
        <p class="text-xs text-gray-400 mt-1">Concluído</p>
      </div>
      <div class="bg-white rounded-2xl border border-gray-100 p-4 text-center shadow-sm">
        <p id="stat-status" class="text-2xl font-extrabold text-emerald-600">✅</p>
        <p class="text-xs text-gray-400 mt-1">Leu hoje</p>
      </div>
    </div>

    <!-- Progresso -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-gray-800">Meu progresso</h2>
        <span id="badge-plano" class="text-xs bg-emerald-50 text-emerald-700 font-semibold px-2.5 py-1 rounded-full border border-emerald-100 hidden"></span>
      </div>

      <div id="sem-plano" class="hidden text-center py-6">
        <div class="text-4xl mb-3">📋</div>
        <p class="text-gray-600 text-sm font-medium mb-1">Nenhum plano de leitura selecionado</p>
        <p class="text-gray-400 text-xs">Configure um plano nas configurações abaixo.</p>
      </div>

      <div id="com-plano" class="hidden">
        <div class="flex items-end justify-between mb-3">
          <p id="plano-progresso" class="text-4xl font-extrabold text-gray-900"></p>
          <p id="plano-pct" class="text-sm font-bold text-emerald-600 mb-1"></p>
        </div>

        <div class="w-full bg-gray-100 rounded-full h-2 mb-5">
          <div id="barra-progresso" class="bg-emerald-500 h-2 rounded-full transition-all duration-700" style="width:0%"></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="bg-gray-50 rounded-xl p-3.5">
            <p class="text-xs text-gray-400 mb-1 font-medium">Último envio</p>
            <p id="ultimo-envio" class="text-sm font-semibold text-gray-700">—</p>
          </div>
          <div class="bg-gray-50 rounded-xl p-3.5">
            <p class="text-xs text-gray-400 mb-1 font-medium">Última leitura</p>
            <p id="ultima-leitura" class="text-sm font-semibold text-gray-700">—</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Configurações -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
      <h2 class="font-bold text-gray-800 mb-5">Configurações</h2>

      <div id="alert-config" class="hidden mb-4 p-3 rounded-xl text-sm"></div>

      <form id="form-config" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nome</label>
          <input id="cfg-nome" type="text"
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-shadow"
            placeholder="Como prefere ser chamado?">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Horário de envio</label>
            <input id="cfg-horario" type="time"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-shadow">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Versão da Bíblia</label>
            <select id="cfg-versao"
              class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white transition-shadow">
              <option value="NVI">NVI</option>
              <option value="ARC">ARC</option>
              <option value="ACF">ACF</option>
              <option value="NVT">NVT</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Plano de leitura</label>
          <select id="cfg-plano"
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white transition-shadow">
            <option value="">Sem plano</option>
          </select>
        </div>
        <button type="submit" id="btn-salvar"
          class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-bold py-2.5 px-4 rounded-xl text-sm transition-colors shadow-sm">
          Salvar configurações
        </button>
      </form>
    </div>

  </div>

  <script>
    const TOKEN = localStorage.getItem('userToken');
    if (!TOKEN) window.location.replace('/login.html');

    document.getElementById('nav-nome').textContent =
      localStorage.getItem('userName') || localStorage.getItem('userEmail') || '';

    function sair() {
      ['userToken', 'userEmail', 'userName'].forEach(k => localStorage.removeItem(k));
      window.location.replace('/login.html');
    }

    function authHeader() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN };
    }

    function formatarData(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    async function carregarPerfil() {
      try {
        const r = await fetch('/api/usuario/me', { headers: authHeader() });
        if (r.status === 401) { sair(); return; }
        const u = await r.json();

        document.getElementById('nav-nome').textContent = u.nome || u.email || '';
        document.getElementById('cfg-nome').value    = u.nome || '';
        document.getElementById('cfg-horario').value = u.horario_envio || '07:00';
        document.getElementById('cfg-versao').value  = u.versao_biblia || 'NVI';

        const leuHojeEl = document.getElementById('stat-status');
        leuHojeEl.textContent = u.leu_hoje ? '✅' : '📖';

        if (u.plano_id && u.total_dias) {
          document.getElementById('sem-plano').classList.add('hidden');
          document.getElementById('com-plano').classList.remove('hidden');

          const badge = document.getElementById('badge-plano');
          badge.textContent = u.plano_nome || '';
          badge.classList.remove('hidden');

          const dia   = u.dia_atual || 1;
          const total = u.total_dias;
          const pct   = Math.round(((dia - 1) / total) * 100);

          document.getElementById('stat-dia').textContent    = dia;
          document.getElementById('stat-pct').textContent    = pct + '%';
          document.getElementById('plano-progresso').textContent = `Dia ${dia} de ${total}`;
          document.getElementById('plano-pct').textContent   = `${pct}% concluído`;
          document.getElementById('barra-progresso').style.width = pct + '%';
          document.getElementById('ultimo-envio').textContent    = formatarData(u.ultimo_envio);
          document.getElementById('ultima-leitura').textContent  = formatarData(u.ultima_leitura);
        } else {
          document.getElementById('sem-plano').classList.remove('hidden');
          document.getElementById('com-plano').classList.add('hidden');
          document.getElementById('stat-dia').textContent = '—';
          document.getElementById('stat-pct').textContent = '—';
        }

        await carregarPlanos(u.plano_id);
      } catch {
        // silencioso
      }
    }

    async function carregarPlanos(planoAtual) {
      try {
        const r = await fetch('/api/inscricao/planos');
        const planos = await r.json();
        const sel = document.getElementById('cfg-plano');
        sel.innerHTML = '<option value="">Sem plano</option>' +
          planos.map(p => `<option value="${p.id}" ${p.id == planoAtual ? 'selected' : ''}>${p.nome}</option>`).join('');
      } catch {}
    }

    const alertConfig = document.getElementById('alert-config');

    function showAlert(msg, ok = false) {
      alertConfig.textContent = msg;
      alertConfig.className = 'mb-4 p-3 rounded-xl text-sm ' +
        (ok ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
            : 'bg-red-50 text-red-700 border border-red-100');
      alertConfig.classList.remove('hidden');
      setTimeout(() => alertConfig.classList.add('hidden'), 4000);
    }

    document.getElementById('form-config').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        const r = await fetch('/api/usuario/me', {
          method: 'PUT',
          headers: authHeader(),
          body: JSON.stringify({
            nome:          document.getElementById('cfg-nome').value || null,
            horario_envio: document.getElementById('cfg-horario').value,
            versao_biblia: document.getElementById('cfg-versao').value,
            plano_id:      document.getElementById('cfg-plano').value || null,
          }),
        });
        if (!r.ok) { showAlert('Erro ao salvar'); return; }
        showAlert('Configurações salvas!', true);
        carregarPerfil();
      } catch {
        showAlert('Erro de conexão');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar configurações';
      }
    });

    carregarPerfil();
  </script>
</body>
</html>
