<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>versozap — criar conta admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    h1, .font-display { font-family: 'Space Grotesk', sans-serif; }

    .btn-bounce {
      transition: transform .3s cubic-bezier(.175,.885,.32,1.275), box-shadow .3s cubic-bezier(.175,.885,.32,1.275);
    }
    .btn-bounce:hover  { transform: scale(1.04) translateY(-2px); }
    .btn-bounce:active { transform: scale(.97); box-shadow: 2px 2px 0px #0a0a0a !important; }

    @keyframes wobble {
      0%  { transform: rotate(0deg); }
      25% { transform: rotate(-4deg); }
      75% { transform: rotate(4deg); }
      100%{ transform: rotate(0deg); }
    }
    .btn-wobble:hover { animation: wobble .5s ease-in-out; }

    input {
      font-family: 'DM Sans', sans-serif;
      border: 4px solid #ccff00; border-radius: 0; outline: none; background: #1a1a1a;
      color: #fff;
      width: 100%; padding: 12px 14px; font-size: 14px; font-weight: 500;
      transition: box-shadow .15s ease;
    }
    input::placeholder { color: #555; }
    input:focus { box-shadow: 4px 4px 0px #ccff00; }
  </style>
</head>
<body>
  <div style="width:100%;max-width:380px;">

    <div style="background:#1a1a1a;border:4px solid #ccff00;box-shadow:8px 8px 0px #ccff00;">
      <!-- Header -->
      <div style="background:#7000ff;padding:20px 24px;border-bottom:4px solid #ccff00;display:flex;align-items:center;gap:12px;">
        <a href="/" style="background:#ccff00;border:3px solid #ccff00;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;" class="btn-bounce">📖</a>
        <div>
          <p style="font-family:'Space Grotesk';font-weight:900;font-size:1rem;color:#fff;letter-spacing:-.02em;">versozap</p>
          <p style="font-size:11px;font-weight:700;color:#ccc;opacity:.8;">configuração inicial do admin</p>
        </div>
      </div>

      <div style="padding:28px 24px;">
        <h1 style="font-family:'Space Grotesk';font-weight:900;font-size:2rem;line-height:1;letter-spacing:-.04em;color:#fff;" class="mb-1">criar conta</h1>
        <p style="color:#aaa;font-size:.875rem;font-weight:500;" class="mb-6">somente para o primeiro acesso administrativo</p>

        <div id="alert" style="display:none;background:#ff0099;border:3px solid #ff0099;padding:10px 14px;margin-bottom:16px;font-size:13px;font-weight:600;color:#fff;box-shadow:3px 3px 0px rgba(255,0,153,.4);"></div>

        <form id="form-register" style="display:flex;flex-direction:column;gap:14px;">
          <div>
            <label style="display:block;font-family:'Space Grotesk';font-weight:800;font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;color:#aaa;">email</label>
            <input id="email" type="email" required placeholder="admin@exemplo.com">
          </div>
          <div>
            <label style="display:block;font-family:'Space Grotesk';font-weight:800;font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;color:#aaa;">senha</label>
            <input id="senha" type="password" required minlength="6" placeholder="mínimo 6 caracteres">
          </div>
          <div>
            <label style="display:block;font-family:'Space Grotesk';font-weight:800;font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;color:#aaa;">confirmar senha</label>
            <input id="confirmar" type="password" required placeholder="repita a senha">
          </div>
          <button type="submit" id="btn"
            style="background:#ccff00;color:#0a0a0a;border:4px solid #ccff00;border-radius:0;box-shadow:6px 6px 0px rgba(204,255,0,.3);padding:14px;font-family:'Space Grotesk';font-weight:900;font-size:1rem;letter-spacing:-.01em;cursor:pointer;margin-top:4px;"
            class="btn-bounce btn-wobble w-full">
            criar conta admin →
          </button>
        </form>

        <p style="text-align:center;font-size:13px;font-weight:500;color:#888;margin-top:20px;">
          já tem conta?
          <a href="/admin.html" style="font-family:'Space Grotesk';font-weight:800;color:#ccff00;text-decoration:none;border-bottom:2px solid #ccff00;">fazer login →</a>
        </p>
      </div>
    </div>

    <p style="text-align:center;margin-top:16px;">
      <a href="/" style="font-size:12px;font-weight:600;color:#555;text-decoration:none;">← voltar ao início</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem('vzToken')) window.location.replace('/dashboard.html');

    const alertEl = document.getElementById('alert');

    function showAlert(msg, ok = false) {
      alertEl.textContent = msg;
      alertEl.style.background = ok ? '#ccff00' : '#ff0099';
      alertEl.style.color = ok ? '#0a0a0a' : '#fff';
      alertEl.style.display = 'block';
    }

    document.getElementById('form-register').addEventListener('submit', async (e) => {
      e.preventDefault();
      const senha    = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;
      if (senha !== confirmar) { showAlert('as senhas não coincidem'); return; }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'criando...';
      alertEl.style.display = 'none';

      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, senha }),
        });
        const d = await r.json();
        if (!r.ok) { showAlert(d.erro || 'erro ao criar conta'); return; }

        localStorage.setItem('vzToken', d.token);
        localStorage.setItem('vzEmail', d.email);
        window.location.replace('/dashboard.html');
      } catch {
        showAlert('erro de conexão com o servidor');
      } finally {
        btn.disabled = false;
        btn.textContent = 'criar conta admin →';
      }
    });
  </script>
</body>
</html>
