<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersoZap — Criar conta admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex flex-col items-center gap-1">
        <span class="text-5xl">📖</span>
        <span class="font-extrabold text-xl text-gray-900">VersoZap</span>
      </a>
      <p class="text-gray-500 text-sm mt-2">Configuração inicial do admin</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
      <div id="alert" class="hidden mb-4 p-3 rounded-xl text-sm"></div>

      <form id="form-register" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
          <input id="email" type="email" required
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-shadow"
            placeholder="admin@exemplo.com">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Senha</label>
          <input id="senha" type="password" required minlength="6"
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-shadow"
            placeholder="Mínimo 6 caracteres">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Confirmar senha</label>
          <input id="confirmar" type="password" required
            class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-shadow"
            placeholder="Repita a senha">
        </div>
        <button type="submit" id="btn"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-4 rounded-xl text-sm transition-colors shadow-sm">
          Criar conta
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-5">
        Já tem conta?
        <a href="/admin.html" class="text-emerald-600 hover:text-emerald-700 font-semibold">Fazer login</a>
      </p>
    </div>

    <p class="text-center mt-5">
      <a href="/" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">← Voltar ao início</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem('vzToken')) window.location.replace('/dashboard.html');

    const alertEl = document.getElementById('alert');

    function showAlert(msg, ok = false) {
      alertEl.textContent = msg;
      alertEl.className = 'mb-4 p-3 rounded-xl text-sm ' +
        (ok ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
            : 'bg-red-50 text-red-700 border border-red-100');
      alertEl.classList.remove('hidden');
    }

    document.getElementById('form-register').addEventListener('submit', async (e) => {
      e.preventDefault();
      const senha    = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;

      if (senha !== confirmar) { showAlert('As senhas não coincidem'); return; }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Criando...';

      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, senha }),
        });
        const d = await r.json();
        if (!r.ok) { showAlert(d.erro || 'Erro ao criar conta'); return; }

        localStorage.setItem('vzToken', d.token);
        localStorage.setItem('vzEmail', d.email);
        window.location.replace('/dashboard.html');
      } catch {
        showAlert('Erro de conexão com o servidor');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
