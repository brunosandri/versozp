<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersoZap — Criar conta admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">📖</div>
      <h1 class="text-2xl font-bold text-gray-800">VersoZap</h1>
      <p class="text-gray-500 text-sm mt-1">Configuração inicial</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
      <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

      <form id="form-register" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="email" type="email" required
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="admin@exemplo.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input id="senha" type="password" required minlength="6"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="Mínimo 6 caracteres">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar senha</label>
          <input id="confirmar" type="password" required
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="Repita a senha">
        </div>
        <button type="submit" id="btn"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors">
          Criar conta
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Já tem conta?
        <a href="/login.html" class="text-green-600 hover:underline font-medium">Fazer login</a>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('vzToken')) window.location.replace('/dashboard.html');

    const alertEl = document.getElementById('alert');

    function showAlert(msg, tipo = 'erro') {
      alertEl.textContent = msg;
      alertEl.className = 'mb-4 p-3 rounded-lg text-sm ' +
        (tipo === 'erro' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200');
      alertEl.classList.remove('hidden');
    }

    document.getElementById('form-register').addEventListener('submit', async (e) => {
      e.preventDefault();
      const senha = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;

      if (senha !== confirmar) { showAlert('As senhas não coincidem'); return; }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Criando...';

      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, senha }),
        });
        const d = await r.json();
        if (!r.ok) { showAlert(d.erro || 'Erro ao criar conta'); return; }

        localStorage.setItem('vzToken', d.token);
        localStorage.setItem('vzEmail', d.email);
        window.location.replace('/dashboard.html');
      } catch {
        showAlert('Erro de conexão com o servidor');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
