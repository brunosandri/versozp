<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersoZap — Criar conta</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="text-5xl mb-3 block">📖</a>
      <h1 class="text-3xl font-bold text-gray-800">VersoZap</h1>
      <p class="text-gray-600 mt-2">Crie sua conta e comece a ler a Bíblia hoje</p>
    </div>

    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
      <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

      <form id="form-signup" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
            <input id="nome" type="text"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
              placeholder="Como prefere ser chamado?">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
            <input id="email" type="email" required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
              placeholder="seu@email.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Senha <span class="text-red-500">*</span></label>
            <input id="senha" type="password" required minlength="6"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
              placeholder="Mín. 6 caracteres">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar senha <span class="text-red-500">*</span></label>
            <input id="confirmar" type="password" required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
              placeholder="Repita a senha">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp <span class="text-red-500">*</span></label>
            <input id="telefone" type="tel" required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
              placeholder="(67) 99999-9999">
            <p class="text-xs text-gray-400 mt-1">Somente Brasil. Inclua o DDD.</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Plano de leitura</label>
            <select id="plano_id"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white">
              <option value="">Carregando...</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Horário de envio</label>
            <input id="horario_envio" type="time" value="07:00"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Versão da Bíblia</label>
            <select id="versao_biblia"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white">
              <option value="NVI">NVI — Nova Versão Internacional</option>
              <option value="ARC">ARC — Almeida Revista e Corrigida</option>
              <option value="ACF">ACF — Almeida Corrigida Fiel</option>
              <option value="NVT">NVT — Nova Versão Transformadora</option>
            </select>
          </div>
        </div>

        <button type="submit" id="btn"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg text-sm transition-colors mt-2">
          Criar minha conta 🙏
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Já tem conta?
        <a href="/login.html" class="text-green-600 hover:underline font-medium">Entrar</a>
      </p>
    </div>

    <p class="text-center mt-4">
      <a href="/" class="text-xs text-gray-400 hover:underline">← Voltar ao início</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem('userToken')) window.location.replace('/meu-plano.html');

    async function carregarPlanos() {
      try {
        const r = await fetch('/api/inscricao/planos');
        const planos = await r.json();
        const sel = document.getElementById('plano_id');
        sel.innerHTML = '<option value="">Sem plano definido</option>' +
          planos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
      } catch {
        document.getElementById('plano_id').innerHTML = '<option value="">Erro ao carregar</option>';
      }
    }

    const alertEl = document.getElementById('alert');

    function showAlert(msg) {
      alertEl.textContent = msg;
      alertEl.className = 'mb-4 p-3 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200';
      alertEl.classList.remove('hidden');
    }

    document.getElementById('form-signup').addEventListener('submit', async (e) => {
      e.preventDefault();
      const senha    = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;
      if (senha !== confirmar) { showAlert('As senhas não coincidem'); return; }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Criando conta...';
      alertEl.classList.add('hidden');

      try {
        const r = await fetch('/api/usuario/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome:         document.getElementById('nome').value || null,
            email:        document.getElementById('email').value,
            senha,
            telefone:     document.getElementById('telefone').value,
            versao_biblia: document.getElementById('versao_biblia').value,
            plano_id:     document.getElementById('plano_id').value || null,
            horario_envio: document.getElementById('horario_envio').value,
          }),
        });
        const d = await r.json();
        if (!r.ok) { showAlert(d.erro || 'Erro ao criar conta'); return; }

        localStorage.setItem('userToken', d.token);
        localStorage.setItem('userEmail', d.email);
        localStorage.setItem('userName', d.nome || '');
        window.location.replace('/meu-plano.html');
      } catch {
        showAlert('Erro de conexão. Tente novamente.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Criar minha conta 🙏';
      }
    });

    carregarPlanos();
  </script>
</body>
</html>
