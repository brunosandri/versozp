<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>versozap — conectar whatsapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    h1, h2, .font-display { font-family: 'Space Grotesk', sans-serif; }

    .btn-bounce {
      transition: transform .3s cubic-bezier(.175,.885,.32,1.275), box-shadow .3s cubic-bezier(.175,.885,.32,1.275);
    }
    .btn-bounce:hover  { transform: scale(1.04) translateY(-2px); }
    .btn-bounce:active { transform: scale(.97); }

    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .status-pulse::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      animation: pulse-ring 1.5s ease-out infinite;
      background: inherit;
    }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav style="background:#1a1a1a;border-bottom:4px solid #ccff00;">
    <div style="max-width:500px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
      <a href="/dashboard.html"
        style="display:flex;align-items:center;gap:6px;text-decoration:none;font-family:'Space Grotesk';font-weight:800;font-size:.85rem;color:#aaa;border:3px solid #333;padding:6px 14px;box-shadow:3px 3px 0px #333;"
        class="btn-bounce">
        ← painel
      </a>
      <p style="font-family:'Space Grotesk';font-weight:900;font-size:.95rem;color:#ccff00;letter-spacing:-.02em;">📱 conectar whatsapp</p>
      <div style="width:90px;"></div>
    </div>
  </nav>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;">
    <div style="width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;">

      <!-- Status card -->
      <div style="background:#1a1a1a;border:4px solid #333;box-shadow:6px 6px 0px #ccff00;padding:16px 18px;display:flex;align-items:center;gap:14px;">
        <div style="position:relative;flex-shrink:0;">
          <div id="dot" style="width:16px;height:16px;border-radius:50%;background:#555;border:3px solid #333;position:relative;z-index:1;"></div>
        </div>
        <div style="flex:1;min-width:0;">
          <p id="status-texto" style="font-family:'Space Grotesk';font-weight:800;font-size:.95rem;color:#fff;">verificando...</p>
          <p id="status-detalhe" style="display:none;font-size:11px;color:#888;font-weight:600;margin-top:2px;"></p>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          <button id="btn-reconectar" onclick="reconectar()"
            style="background:transparent;border:3px solid #555;color:#aaa;padding:7px 14px;font-family:'Space Grotesk';font-weight:800;font-size:11px;letter-spacing:.02em;cursor:pointer;box-shadow:3px 3px 0px #333;"
            class="btn-bounce">
            reconectar
          </button>
          <button id="btn-novo-qr" onclick="novoQr()"
            style="background:#ff0099;border:3px solid #ff0099;color:#fff;padding:7px 14px;font-family:'Space Grotesk';font-weight:800;font-size:11px;letter-spacing:.02em;cursor:pointer;box-shadow:3px 3px 0px rgba(255,0,153,.4);"
            class="btn-bounce">
            novo qr
          </button>
        </div>
      </div>

      <!-- QR Code card -->
      <div id="card-qr" style="display:none;background:#1a1a1a;border:4px solid #ccff00;box-shadow:6px 6px 0px #ccff00;padding:24px;text-align:center;">
        <p style="font-family:'Space Grotesk';font-weight:800;font-size:.85rem;color:#ccff00;margin-bottom:4px;">como conectar</p>
        <p style="font-size:12px;color:#888;margin-bottom:20px;">WhatsApp → <strong style="color:#fff;">dispositivos conectados</strong> → <strong style="color:#fff;">conectar dispositivo</strong></p>
        <div style="position:relative;display:inline-block;">
          <div style="background:#fff;border:4px solid #ccff00;box-shadow:6px 6px 0px #ccff00;padding:8px;display:inline-block;">
            <img id="qr-img" src="" alt="QR Code" style="width:200px;height:200px;display:block;object-fit:contain;">
          </div>
          <div id="qr-overlay" style="display:none;position:absolute;inset:0;background:rgba(26,26,26,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:6px;">
            <p style="font-size:1.5rem;">⏳</p>
            <p style="font-size:11px;font-weight:700;color:#ccff00;">atualizando qr...</p>
          </div>
        </div>
        <p style="font-size:11px;color:#666;font-weight:600;margin-top:16px;">o código expira a cada ~20 segundos</p>
      </div>

      <!-- Connected card -->
      <div id="card-ok" style="display:none;background:#1a1a1a;border:4px solid #ccff00;box-shadow:6px 6px 0px #ccff00;padding:28px;text-align:center;">
        <div style="width:64px;height:64px;background:#ccff00;border:4px solid #0a0a0a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 16px;box-shadow:4px 4px 0px #0a0a0a;">✅</div>
        <h2 style="font-family:'Space Grotesk';font-weight:900;font-size:1.3rem;color:#ccff00;letter-spacing:-.02em;margin-bottom:6px;">whatsapp conectado!</h2>
        <p style="font-size:.875rem;color:#888;margin-bottom:20px;">o bot está pronto para enviar os versículos.</p>
        <a href="/dashboard.html"
          style="background:#ccff00;color:#0a0a0a;border:4px solid #ccff00;padding:12px 28px;font-family:'Space Grotesk';font-weight:900;font-size:.9rem;text-decoration:none;display:inline-block;box-shadow:5px 5px 0px rgba(204,255,0,.3);"
          class="btn-bounce">
          ir para o painel →
        </a>
      </div>

      <!-- Error card -->
      <div id="card-erro" style="display:none;background:#1a1a1a;border:4px solid #ff0099;box-shadow:6px 6px 0px #ff0099;padding:16px;">
        <p id="erro-msg" style="font-size:13px;font-weight:600;color:#ff0099;text-align:center;"></p>
      </div>

    </div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('vzToken');
    if (!TOKEN) window.location.replace('/admin.html');

    const statusMap = {
      conectado:     { cor: '#ccff00', border: '#ccff00', label: 'conectado' },
      aguardando_qr: { cor: '#ff0099', border: '#ff0099', label: 'aguardando escaneamento do qr code' },
      conectando:    { cor: '#7000ff', border: '#7000ff', label: 'conectando ao whatsapp...' },
      reconectando:  { cor: '#ff6600', border: '#ff6600', label: 'reconectando...' },
      desconectado:  { cor: '#555',    border: '#555',    label: 'desconectado' },
    };

    let ultimoQr = null;

    async function verificar() {
      try {
        const r = await fetch('/api/whatsapp/status');
        if (!r.ok) return;
        const d = await r.json();

        const info = statusMap[d.status] || { cor: '#555', border: '#555', label: d.status };
        const dot = document.getElementById('dot');
        dot.style.background = info.cor;
        dot.style.borderColor = info.border;
        document.getElementById('status-texto').textContent = info.label;

        const detalheEl = document.getElementById('status-detalhe');
        if (d.tentativasReconexao > 0) {
          detalheEl.textContent = `tentativa ${d.tentativasReconexao}`;
          detalheEl.style.display = 'block';
        } else {
          detalheEl.style.display = 'none';
        }

        const cardQr  = document.getElementById('card-qr');
        const cardOk  = document.getElementById('card-ok');
        const cardErr = document.getElementById('card-erro');
        cardQr.style.display  = 'none';
        cardOk.style.display  = 'none';
        cardErr.style.display = 'none';

        if (d.status === 'conectado') {
          cardOk.style.display = 'block';
        } else if (d.qr) {
          cardQr.style.display = 'block';
          const qrImg = document.getElementById('qr-img');
          if (d.qr !== ultimoQr) {
            ultimoQr = d.qr;
            qrImg.src = d.qr;
          }
        } else if (d.erro) {
          cardErr.style.display = 'block';
          document.getElementById('erro-msg').textContent =
            d.erro.message || 'erro ao conectar. tente reconectar.';
        }
      } catch {}
    }

    function setButtonsDisabled(disabled) {
      ['btn-reconectar','btn-novo-qr'].forEach(id => {
        document.getElementById(id).disabled = disabled;
      });
    }

    async function reconectar() {
      const btn = document.getElementById('btn-reconectar');
      btn.textContent = 'aguarde...';
      setButtonsDisabled(true);
      ultimoQr = null;
      try {
        await fetch('/api/admin/whatsapp/reconectar', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
        });
        await new Promise(r => setTimeout(r, 2000));
        verificar();
      } finally {
        setTimeout(() => {
          btn.textContent = 'reconectar';
          setButtonsDisabled(false);
        }, 4000);
      }
    }

    async function novoQr() {
      if (!confirm('isso vai encerrar a sessão atual e gerar um novo qr para escanear. continuar?')) return;
      const btn = document.getElementById('btn-novo-qr');
      btn.textContent = 'aguarde...';
      setButtonsDisabled(true);
      ultimoQr = null;
      try {
        await fetch('/api/admin/whatsapp/desconectar', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
        });
        await new Promise(r => setTimeout(r, 2500));
        verificar();
      } finally {
        setTimeout(() => {
          btn.textContent = 'novo qr';
          setButtonsDisabled(false);
        }, 5000);
      }
    }

    verificar();
    setInterval(verificar, 3000);
  </script>
</body>
</html>
