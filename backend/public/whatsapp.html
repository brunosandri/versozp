<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersoZap — Conectar WhatsApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col antialiased">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-lg mx-auto px-4 py-3.5 flex items-center justify-between">
      <a href="/dashboard.html" class="text-sm text-gray-500 hover:text-gray-800 font-medium transition-colors flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Painel
      </a>
      <div class="font-bold text-gray-800 flex items-center gap-2">
        <span class="text-lg">📱</span> Conectar WhatsApp
      </div>
      <div class="w-16"></div>
    </div>
  </nav>

  <div class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-sm space-y-4">

      <!-- Status -->
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 flex items-center gap-3">
        <div id="dot" class="w-3 h-3 rounded-full bg-gray-300 shrink-0 ring-4 ring-gray-100"></div>
        <div class="flex-1 min-w-0">
          <p id="status-texto" class="text-sm font-semibold text-gray-700">Verificando...</p>
          <p id="status-detalhe" class="text-xs text-gray-400 mt-0.5 hidden"></p>
        </div>
        <div class="flex gap-2 shrink-0">
          <button id="btn-reconectar" onclick="reconectar()"
            class="text-xs font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg transition-colors border border-gray-200">
            Reconectar
          </button>
          <button id="btn-novo-qr" onclick="novoQr()"
            class="text-xs font-semibold bg-amber-50 hover:bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg transition-colors border border-amber-200">
            Novo QR
          </button>
        </div>
      </div>

      <!-- QR Code -->
      <div id="card-qr" class="hidden bg-white rounded-2xl border border-gray-100 shadow-sm p-6 text-center">
        <p class="text-sm text-gray-500 mb-1 font-medium">Como conectar:</p>
        <p class="text-xs text-gray-400 mb-5">Abra o WhatsApp → <strong>Dispositivos conectados</strong> → <strong>Conectar dispositivo</strong></p>
        <div class="relative inline-block">
          <img id="qr-img" src="" alt="QR Code"
            class="w-56 h-56 rounded-2xl border border-gray-100 object-contain shadow-sm">
          <div id="qr-overlay" class="hidden absolute inset-0 bg-white/80 rounded-2xl flex items-center justify-center backdrop-blur-sm">
            <div class="text-center">
              <div class="text-2xl mb-1 animate-spin">⏳</div>
              <p class="text-xs text-gray-500 font-medium">Atualizando QR...</p>
            </div>
          </div>
        </div>
        <p class="text-xs text-gray-400 mt-4">O código expira a cada ~20 segundos.</p>
      </div>

      <!-- Conectado -->
      <div id="card-ok" class="hidden bg-emerald-50 border border-emerald-200 rounded-2xl shadow-sm p-6 text-center">
        <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">✅</div>
        <h2 class="font-bold text-emerald-800 mb-1">WhatsApp conectado!</h2>
        <p class="text-sm text-emerald-600 mb-5">O bot está pronto para enviar os versículos.</p>
        <a href="/dashboard.html"
          class="inline-block text-sm bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2.5 rounded-xl transition-colors shadow-sm">
          Ir para o painel
        </a>
      </div>

      <!-- Erro -->
      <div id="card-erro" class="hidden bg-red-50 border border-red-100 rounded-2xl shadow-sm p-4">
        <p id="erro-msg" class="text-sm text-red-700 text-center font-medium"></p>
      </div>

    </div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('vzToken');
    if (!TOKEN) window.location.replace('/admin.html');

    const statusMap = {
      conectado:     { cor: 'bg-emerald-500 ring-emerald-100', label: 'Conectado' },
      aguardando_qr: { cor: 'bg-yellow-400 ring-yellow-100',   label: 'Aguardando escaneamento do QR Code' },
      conectando:    { cor: 'bg-blue-400 ring-blue-100',        label: 'Conectando ao WhatsApp...' },
      reconectando:  { cor: 'bg-orange-400 ring-orange-100',    label: 'Reconectando...' },
      desconectado:  { cor: 'bg-red-500 ring-red-100',          label: 'Desconectado' },
    };

    let ultimoQr = null;

    async function verificar() {
      try {
        const r = await fetch('/api/whatsapp/status');
        if (!r.ok) return;
        const d = await r.json();

        const info = statusMap[d.status] || { cor: 'bg-gray-400 ring-gray-100', label: d.status };
        document.getElementById('dot').className = 'w-3 h-3 rounded-full shrink-0 ring-4 ' + info.cor;
        document.getElementById('status-texto').textContent = info.label;

        const detalheEl = document.getElementById('status-detalhe');
        if (d.tentativasReconexao > 0) {
          detalheEl.textContent = `Tentativa ${d.tentativasReconexao}`;
          detalheEl.classList.remove('hidden');
        } else {
          detalheEl.classList.add('hidden');
        }

        const cardQr  = document.getElementById('card-qr');
        const cardOk  = document.getElementById('card-ok');
        const cardErr = document.getElementById('card-erro');

        cardQr.classList.add('hidden');
        cardOk.classList.add('hidden');
        cardErr.classList.add('hidden');

        if (d.status === 'conectado') {
          cardOk.classList.remove('hidden');
        } else if (d.qr) {
          cardQr.classList.remove('hidden');
          const qrImg = document.getElementById('qr-img');
          if (d.qr !== ultimoQr) {
            ultimoQr = d.qr;
            qrImg.src = d.qr;
          }
        } else if (d.erro) {
          cardErr.classList.remove('hidden');
          document.getElementById('erro-msg').textContent =
            d.erro.message || 'Erro ao conectar. Tente reconectar.';
        }
      } catch {
        // rede indisponível, tenta de novo no próximo tick
      }
    }

    async function setButtonsDisabled(disabled) {
      ['btn-reconectar', 'btn-novo-qr'].forEach(id => {
        document.getElementById(id).disabled = disabled;
      });
    }

    async function reconectar() {
      const btn = document.getElementById('btn-reconectar');
      btn.textContent = 'Aguarde...';
      setButtonsDisabled(true);
      ultimoQr = null;

      try {
        await fetch('/api/admin/whatsapp/reconectar', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
        });
        await new Promise(r => setTimeout(r, 2000));
        verificar();
      } finally {
        setTimeout(() => {
          btn.textContent = 'Reconectar';
          setButtonsDisabled(false);
        }, 4000);
      }
    }

    async function novoQr() {
      if (!confirm('Isso vai encerrar a sessão atual e gerar um novo QR para escanear. Continuar?')) return;
      const btn = document.getElementById('btn-novo-qr');
      btn.textContent = 'Aguarde...';
      setButtonsDisabled(true);
      ultimoQr = null;

      try {
        await fetch('/api/admin/whatsapp/desconectar', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
        });
        await new Promise(r => setTimeout(r, 2500));
        verificar();
      } finally {
        setTimeout(() => {
          btn.textContent = 'Novo QR';
          setButtonsDisabled(false);
        }, 5000);
      }
    }

    verificar();
    setInterval(verificar, 3000);
  </script>
</body>
</html>
