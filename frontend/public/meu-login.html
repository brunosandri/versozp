<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VersoZap — Entrar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="text-4xl mb-2">📖</div>
      <h1 class="text-2xl font-bold text-gray-800">VersoZap</h1>
      <p class="text-gray-500 text-sm mt-1">Meu painel</p>
    </div>

    <!-- Tabs -->
    <div class="flex bg-gray-100 rounded-xl p-1 mb-4 gap-1">
      <button id="tab-login" onclick="showTab('login')"
        class="flex-1 py-2 text-sm font-medium rounded-lg bg-white shadow text-gray-800 transition-all">
        Entrar
      </button>
      <button id="tab-criar" onclick="showTab('criar')"
        class="flex-1 py-2 text-sm font-medium rounded-lg text-gray-500 transition-all">
        Criar conta
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
      <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

      <!-- Login -->
      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="login-email" type="email" required autocomplete="email"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="seu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input id="login-senha" type="password" required autocomplete="current-password"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="••••••">
        </div>
        <button type="submit" id="btn-login"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
          Entrar
        </button>
      </form>

      <!-- Criar conta -->
      <form id="form-criar" class="hidden space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
          <input id="criar-nome" type="text"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="Seu nome">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp <span class="text-red-500">*</span></label>
          <input id="criar-telefone" type="tel" required
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="(67) 99999-9999">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
          <input id="criar-email" type="email" required
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="seu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha <span class="text-red-500">*</span></label>
          <input id="criar-senha" type="password" required minlength="6"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
            placeholder="Mínimo 6 caracteres">
        </div>
        <button type="submit" id="btn-criar"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
          Criar conta
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">
      <a href="/cadastro.html" class="hover:underline">Ainda não se inscreveu? Faça aqui</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem('vzUserToken')) window.location.replace('/meu-plano.html');

    const alertEl = document.getElementById('alert');

    function showAlert(msg, tipo = 'erro') {
      alertEl.textContent = msg;
      alertEl.className = 'mb-4 p-3 rounded-lg text-sm ' +
        (tipo === 'ok'
          ? 'bg-green-50 text-green-700 border border-green-200'
          : 'bg-red-50 text-red-700 border border-red-200');
      alertEl.classList.remove('hidden');
    }

    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-criar').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all ' +
        (isLogin ? 'bg-white shadow text-gray-800' : 'text-gray-500');
      document.getElementById('tab-criar').className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all ' +
        (!isLogin ? 'bg-white shadow text-gray-800' : 'text-gray-500');
      alertEl.classList.add('hidden');
    }

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Entrando...';
      alertEl.classList.add('hidden');
      try {
        const r = await fetch('/api/usuario/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            senha: document.getElementById('login-senha').value,
          }),
        });
        const d = await r.json();
        if (!r.ok) { showAlert(d.erro || 'Email ou senha inválidos'); return; }
        localStorage.setItem('vzUserToken', d.token);
        localStorage.setItem('vzUserNome', d.nome || d.email);
        window.location.replace('/meu-plano.html');
      } catch { showAlert('Erro de conexão. Tente novamente.'); }
      finally { btn.disabled = false; btn.textContent = 'Entrar'; }
    });

    document.getElementById('form-criar').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-criar');
      btn.disabled = true; btn.textContent = 'Criando...';
      alertEl.classList.add('hidden');
      const tel = document.getElementById('criar-telefone').value.replace(/\D/g, '');
      try {
        const r = await fetch('/api/usuario/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('criar-email').value,
            senha: document.getElementById('criar-senha').value,
            nome:  document.getElementById('criar-nome').value || null,
            telefone: tel,
          }),
        });
        const d = await r.json();
        if (!r.ok) { showAlert(d.erro || 'Erro ao criar conta'); return; }
        localStorage.setItem('vzUserToken', d.token);
        localStorage.setItem('vzUserNome', d.nome || d.email);
        window.location.replace('/meu-plano.html');
      } catch { showAlert('Erro de conexão. Tente novamente.'); }
      finally { btn.disabled = false; btn.textContent = 'Criar conta'; }
    });
  </script>
</body>
</html>
